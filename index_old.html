<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK挑战赛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #4F46E5; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; }
        .modules { display: flex; gap: 20px; margin-bottom: 30px; }
        .module { flex: 1; background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .module:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .module.math { border-top: 4px solid #3B82F6; }
        .module.chinese { border-top: 4px solid #EF4444; }
        .module.english { border-top: 4px solid #10B981; }
        .sub-modules { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .sub-btn { background: white; border: 1px solid #ddd; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .sub-btn.active { background: #4F46E5; color: white; }
        .start-btn { background: linear-gradient(135deg, #4F46E5, #7C3AED); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
        .user-info { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .user-name { font-weight: bold; }
        @media (max-width: 768px) {
            .modules { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PK挑战赛</h1>
            <p>数学 · 语文 · 英语</p>
        </div>
        
        <div class="user-info">
            <div class="user-name" id="displayName">未登录</div>
            <div>
                <button onclick="editName()">修改昵称</button>
                <button onclick="showLeaderboard()">排行榜</button>
            </div>
        </div>
        
        <div class="modules">
            <div class="module math" onclick="selectModule('math')">
                <div style="font-size: 40px;">🔢</div>
                <h3>口算PK</h3>
                <p>数学</p>
            </div>
            <div class="module chinese" onclick="selectModule('chinese')">
                <div style="font-size: 40px;">📝</div>
                <h3>语文PK</h3>
                <p>语文</p>
            </div>
            <div class="module english" onclick="selectModule('english')">
                <div style="font-size: 40px;">🔤</div>
                <h3>单词PK</h3>
                <p>英语</p>
            </div>
        </div>
        
        <div style="text-align: center; margin-bottom: 15px;">选择挑战类型</div>
        <div class="sub-modules" id="mathSubs">
            <button class="sub-btn active" onclick="selectSub('compare')">比大小</button>
            <button class="sub-btn" onclick="selectSub('addsub')">加减法</button>
            <button class="sub-btn" onclick="selectSub('multidiv')">乘除法</button>
        </div>
        
        <button class="start-btn" onclick="startChallenge()">开始挑战</button>
    </div>
    
    <script>
        let currentModule = 'math';
        let currentSub = 'compare';
        
        function selectModule(module) {
            currentModule = module;
            document.querySelectorAll('.module').forEach(m => m.style.boxShadow = '0 2px 5px rgba(0,0,0,0.1)');
            document.querySelector(`.module.${module}`).style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';
        }
        
        function selectSub(sub) {
            currentSub = sub;
            document.querySelectorAll('#mathSubs .sub-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function editName() {
            const name = prompt('请输入昵称:', '');
            if (name) {
                document.getElementById('displayName').textContent = name;
                localStorage.setItem('userName', name);
            }
        }
        
        function startChallenge() {
            const userName = localStorage.getItem('userName') || '匿名';
            window.location.href = `challenge.html?module=${currentModule}&sub=${currentSub}&user=${userName}`;
        }
        
        function showLeaderboard() {
            alert('排行榜功能');
        }
        
        // 初始化
        window.onload = function() {
            const userName = localStorage.getItem('userName');
            if (userName) {
                document.getElementById('displayName').textContent = userName;
            }
        };
    </script>
</body>
</html>
