<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK挑战赛</title>
    <style>
        :root {
            --primary: #1677FF; /* 作业帮蓝色 */
            --primary-light: #4096FF;
            --success: #52C41A;
            --error: #FF4D4F;
            --warning: #FAAD14;
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text: #262626;
            --text-light: #8C8C8C;
            --math-color: #1677FF; /* 数学蓝色 */
            --chinese-color: #FF4D4F; /* 语文红色 */
            --english-color: #52C41A; /* 英语绿色 */
            --border: #F0F0F0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #E6F4FF 0%, #F0F8FF 100%);
            min-height: 100vh;
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* 顶部导航 - 作业帮风格 */
        .header {
            background: linear-gradient(135deg, #1677FF 0%, #4096FF 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            position: relative;
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.15);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
            font-weight: 400;
        }



            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 主容器 - 作业帮风格 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 模块选择 - 作业帮风格 */
        .section-label {
            text-align: center;
            font-size: 16px;
            color: var(--text);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .modules {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 0 auto 40px;
            max-width: 900px;
        }

        .module-card {
            background: white;
            border-radius: 12px;
            padding: 28px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: transparent;
        }

        .module-card.active {
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.2);
            transform: translateY(-4px);
        }

        .module-card.math { 
            background: linear-gradient(135deg, #F0F8FF 0%, #E6F4FF 100%);
            border-top: 4px solid var(--math-color);
        }
        .module-card.math.active {
            background: linear-gradient(135deg, #D4E9FF 0%, #B8DEFF 100%);
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.25);
        }
        .module-card.chinese { 
            background: linear-gradient(135deg, #FFF2F0 0%, #FFE6E6 100%);
            border-top: 4px solid var(--chinese-color);
        }
        .module-card.chinese.active {
            background: linear-gradient(135deg, #FFD8D6 0%, #FFC4C2 100%);
            box-shadow: 0 4px 16px rgba(255, 77, 79, 0.25);
        }
        .module-card.english { 
            background: linear-gradient(135deg, #F6FFED 0%, #E9FFD9 100%);
            border-top: 4px solid var(--english-color);
        }
        .module-card.english.active {
            background: linear-gradient(135deg, #D9F7BE 0%, #B7EB8F 100%);
            box-shadow: 0 4px 16px rgba(82, 196, 26, 0.25);
        }

        .module-icon {
            font-size: 40px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .module-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .module-desc {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
        }

        /* 子模块选择 - 作业帮风格 */
        .sub-modules {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 0 auto 40px;
            max-width: 800px;
        }

        .sub-module-btn {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            color: var(--text);
        }

        .sub-module-btn:hover {
            border-color: var(--primary);
            background: #F5F8FF;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .sub-module-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 开始挑战按钮 */
        .start-challenge-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 50px auto 30px;
            padding: 20px 40px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(79, 70, 229, 0.4);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .start-challenge-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .start-challenge-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
        }

        .start-challenge-btn:hover::before {
            left: 100%;
        }

        .start-challenge-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.3);
        }

        /* 排行榜入口 - 作业帮风格 */
        .leaderboard-entry {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 32px auto;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
        }

        .leaderboard-entry:hover {
            border-color: var(--warning);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .leaderboard-entry h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .leaderboard-entry p {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
        }

        /* 用户信息 - 作业帮风格 */
        .user-info {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            margin: 0 auto 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            box-shadow: var(--shadow);
        }

        .user-name {
            font-weight: 500;
            font-size: 18px;
            color: var(--text);
        }

        .user-actions {
            display: flex;
            gap: 12px;
        }

        .user-btn {
            background: var(--primary);
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .user-btn:hover {
            background: var(--primary-light);
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.3);
        }

        /* 隐藏 */
        .hidden {
            display: none !important;
        }

        /* 响应式 - 作业帮风格 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .modules {
                grid-template-columns: 1fr;
                gap: 16px;
                max-width: 100%;
            }
            
            .module-card {
                padding: 24px 20px;
            }
            
            .sub-modules {
                flex-direction: column;
                align-items: stretch;
            }
            
            .sub-module-btn {
                width: 100%;
            }
            
            .user-info {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 20px;
            }
            
            .user-actions {
                width: 100%;
                justify-content: center;
            }
            
            .start-challenge-btn {
                max-width: 100%;
            }
            
            .leaderboard-entry {
                max-width: 100%;
                padding: 20px 24px;
            }
        }
        
        @media (max-width: 480px) {
            .header {
                padding: 16px 0;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .module-card {
                padding: 20px 16px;
            }
            
            .module-icon {
                font-size: 36px;
            }
            
            .module-name {
                font-size: 17px;
            }
            
            .start-challenge-btn {
                padding: 14px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    
    <div class="header">
        <div class="header-content">
            <h1>🏆 PK挑战赛</h1>
            <p>数学 · 语文 · 英语</p>
        </div>
    </div>

    <div class="container">
        <!-- 用户信息栏 -->
        <div class="user-info" id="userInfo">
            <div class="user-name" id="displayName">未登录</div>
            <div class="user-actions">
                <button class="user-btn" onclick="editName()">✏️ 修改昵称</button>
                <button class="user-btn" onclick="showLeaderboard()">📊 排行榜</button>
            </div>
        </div>

        <!-- 模块选择 -->
        <div class="section-label">选择科目</div>
        <div class="modules">
            <div class="module-card math" onclick="selectModule('math')">
                <div class="module-icon">🔢</div>
                <div class="module-name">口算PK</div>
                <div class="module-desc">数学</div>
            </div>
            <div class="module-card chinese" onclick="selectModule('chinese')">
                <div class="module-icon">📝</div>
                <div class="module-name">语文PK</div>
                <div class="module-desc">语文</div>
            </div>
            <div class="module-card english" onclick="selectModule('english')">
                <div class="module-icon">🔤</div>
                <div class="module-name">单词PK</div>
                <div class="module-desc">英语</div>
            </div>
        </div>

        <!-- 数学子模块 -->
        <div class="section-label" id="subModuleLabel">选择挑战类型</div>
        <div class="sub-modules" id="mathSubs">
            <button class="sub-module-btn active" onclick="selectSubModule('math', 'compare', this)">比大小</button>
            <button class="sub-module-btn" onclick="selectSubModule('math', 'addsub', this)">加减法</button>
            <button class="sub-module-btn" onclick="selectSubModule('math', 'multidiv', this)">乘除法</button>
        </div>

        <!-- 语文子模块 -->
        <div class="sub-modules hidden" id="chineseSubs">
            <button class="sub-module-btn active" onclick="selectSubModule('chinese', 'idiom', this)">成语填词</button>
            <button class="sub-module-btn" onclick="selectSubModule('chinese', 'poetry', this)">诗词补</button>
        </div>

        <!-- 英语子模块 -->
        <div class="sub-modules hidden" id="englishSubs">
            <button class="sub-module-btn active" onclick="selectSubModule('english', 'match', this)">单词连连看</button>
            <button class="sub-module-btn" onclick="selectSubModule('english', 'listen', this)">听音选词</button>
        </div>

        <!-- 开始挑战按钮 -->
        <button class="start-challenge-btn" id="startChallengeBtn" onclick="doStartChallenge()">
            开始挑战
        </button>

        <!-- 排行榜入口 -->
        <div class="leaderboard-entry" onclick="showLeaderboard()">
            <h3>🏆 挑战排行榜</h3>
            <p>查看各模式顶尖选手</p>
        </div>
    </div>

    <script>
        // 用户名存储键名
        const USERNAME_KEY = 'pkChallengeUserName';
        const LEADERBOARD_KEY = 'pkChallengeLeaderboard';

        // 模块名称映射
        const MODULE_NAMES = {
            'math-compare': '比大小',
            'math-addsub': '加减法',
            'math-multidiv': '乘除法',
            'chinese-idiom': '成语填词',
            'chinese-poetry': '诗词补',
            'english-match': '单词连连看',
            'english-listen': '听音选词'
        };

        // 页面加载时检查用户名
        window.onload = function() {
            const userName = localStorage.getItem(USERNAME_KEY);
            if (userName) {
                document.getElementById('displayName').textContent = '👤 ' + userName;
            } else {
                // 首次访问，引导输入昵称
                setTimeout(() => editName(), 500);
            }
            // 初始化开始挑战按钮文字
            updateStartButton();
        };

        // 当前选中的模块和子模块
        let currentModule = 'math';
        let currentSubModule = 'compare';

        // 选择模块
        function selectModule(module) {
            currentModule = module;
            // 默认选中第一个子模块
            if (module === 'math') currentSubModule = 'compare';
            else if (module === 'chinese') currentSubModule = 'idiom';
            else currentSubModule = 'match';

            // 更新选中状态
            document.querySelectorAll('.module-card').forEach(card => {
                card.classList.remove('active');
            });
            document.querySelector(`.module-card.${module}`).classList.add('active');

            // 显示对应子模块
            document.getElementById('mathSubs').classList.toggle('hidden', module !== 'math');
            document.getElementById('chineseSubs').classList.toggle('hidden', module !== 'chinese');
            document.getElementById('englishSubs').classList.toggle('hidden', module !== 'english');

            // 更新子模块提示文字
            const labels = { 'math': '选择挑战类型', 'chinese': '选择挑战类型', 'english': '选择挑战类型' };
            document.getElementById('subModuleLabel').textContent = labels[module] || '选择挑战类型';

            // 更新子模块按钮选中状态
            updateSubModuleButtons();
            updateStartButton();
        }

        // 选择子模块
        function selectSubModule(module, subModule, btn) {
            currentModule = module;
            currentSubModule = subModule;
            updateSubModuleButtons();
            updateStartButton();
        }

        // 更新子模块按钮状态
        function updateSubModuleButtons() {
            const container = document.getElementById(`${currentModule}Subs`);
            if (container) {
                container.querySelectorAll('.sub-module-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
        }

        // 更新开始挑战按钮文字
        function updateStartButton() {
            const btn = document.getElementById('startChallengeBtn');
            const modeName = MODULE_NAMES[`${currentModule}-${currentSubModule}`];
            btn.textContent = `开始挑战 - ${modeName}`;
        }

        // 执行开始挑战 - 极速跳转
        function doStartChallenge() {
            const userName = localStorage.getItem(USERNAME_KEY);
            if (!userName) {
                alert('请先输入昵称！');
                editName();
                return;
            }

            // 直接跳转，最快速
            const url = 'challenge.html?module=' + currentModule + '&subModule=' + currentSubModule + '&userName=' + encodeURIComponent(userName);
            window.location.href = url;
        }

        // 开始挑战（保留兼容旧代码）
        function startChallenge(module, subModule) {
            currentModule = module;
            currentSubModule = subModule;
            doStartChallenge();
        }

        // 修改昵称
        function editName() {
            const currentName = localStorage.getItem(USERNAME_KEY) || '';
            const name = prompt('请输入你的昵称（最多10字）:', currentName);
            if (name && name.trim()) {
                localStorage.setItem(USERNAME_KEY, name.trim());
                document.getElementById('displayName').textContent = '👤 ' + name.trim();
            }
        }

        // 显示排行榜
        function showLeaderboard() {
            // 获取所有榜单数据
            const data = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || '[]');
            
            // 按得分排序取前10
            const sorted = data.sort((a, b) => b.totalScore - a.totalScore).slice(0, 10);
            
            let html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - PK挑战赛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #F8FAFC; padding: 20px; }
        .main { max-width: 640px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #4F46E5, #7C3AED); color: white; padding: 20px; text-align: center; border-radius: 16px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .back-btn { display: inline-block; margin-bottom: 15px; color: #4F46E5; text-decoration: none; font-weight: 600; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; background: linear-gradient(135deg, #F59E0B, #EF4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .row { display: grid; grid-template-columns: 50px 1fr 60px 60px; padding: 12px; border-bottom: 1px solid #E2E8F0; align-items: center; }
        .row:last-child { border-bottom: none; }
        .row:hover { background: #F8FAFC; }
        .rank { font-weight: 700; font-size: 18px; }
        .rank-1 { color: #FFD700; } .rank-2 { color: #C0C0C0; } .rank-3 { color: #CD7F32; }
        .name { font-weight: 600; }
        .score { color: #4F46E5; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .module { font-size: 12px; color: #64748B; }
        .empty { text-align: center; padding: 40px; color: #64748B; }
    </style>
</head>
<body>
    <div class="main">
    <a href="index.html" class="back-btn">← 返回主页</a>
    <div class="header">
        <h1>🏆 全局排行榜</h1>
        <p>所有模式顶尖选手</p>
    </div>
    <div class="card">
        <div class="title">🏆 排行榜</div>`;

            if (sorted.length === 0) {
                html += '<div class="empty">暂无排行榜数据<br>快来成为第一个挑战者吧！</div>';
            } else {
                html += '<div class="row" style="background:#f1f5f9;font-weight:700;"><div>排名</div><div>玩家</div><div>得分</div><div>模式</div></div>';
                sorted.forEach((item, index) => {
                    const rankClass = index < 3 ? `rank-${index + 1}` : '';
                    const medal = index === 0 ? '🥇' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : ''));
                    const moduleName = MODULE_NAMES[`${item.module}-${item.subModule}`] || '综合';
                    html += `<div class="row ${rankClass}"><div class="rank">${medal || (index + 1)}</div><div class="name">${item.userName}</div><div class="score">${item.totalScore}</div><div class="module">${moduleName}</div></div>`;
                });
            }

            html += `</div></div></body></html>`;
            
            // 在新窗口打开排行榜
            const win = window.open('', '_blank');
            win.document.write(html);
            win.document.close();
        }
    </script>
</body>
</html>
